<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lone Star Federal Bank - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-image: url('images/backdrop.jpg');
            background-size: 100% auto;
            background-position: center;
            background-repeat: no-repeat;
        }
        main {
            flex: 1 0 auto;
        }
        footer {
            flex-shrink: 0;
        }
        /* Ensure content readability over background */
        .bg-white {
            background-color: rgba(255, 255, 255, 0.9);
        }
        header {
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.92), rgba(30, 64, 175, 0)); /* Blue gradient from opaque to transparent */
        }
    </style>
</head>
<body class="bg-gray-100 font-sans flex flex-col min-h-screen">
<!-- Header -->
<header class="text-white py-4"> <!-- Removed bg-blue-900 class -->
    <div class="container mx-auto px-4 flex justify-between items-center">
        <div class="flex items-center">
            <a href="home.html">
                <img src="images/starlogo.png" alt="Lone Star Federal Bank Logo" class="mr-2" style="max-height: 60px; height: auto;">
            </a>
            <h1 class="text-2xl font-bold">Lone Star Federal Bank</h1>
        </div>
        <nav>
            <ul class="flex space-x-4">
                <li><a href="#" class="hover:underline">Home</a></li>
                <li><a href="#" class="hover:underline">Accounts</a></li>
                <li><a href="#" class="hover:underline">Loans</a></li>
                <li><a href="#" class="hover:underline">Contact</a></li>
            </ul>
        </nav>
    </div>
</header>

<!-- Main Content -->
<main class="container mx-auto px-4 py-8 flex justify-center flex-1">
    <div class="bg-white p-4 rounded-lg shadow-lg w-full max-w-sm" style="height: 525px;">
        <h2 class="text-2xl font-semibold text-center text-blue-900 mb-6">Online Banking Login</h2>
        <p class="text-center text-red-600 mb-4">Urgent: Update your account details to avoid suspension.</p>
        <form id="loginForm" action="phished.html" method="get">
            <div class="mb-4">
                <label for="username" class="block text-gray-700 font-medium mb-2">Username</label>
                <input type="text" id="username" name="username" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter your username" required>
            </div>
            <div class="mb-6">
                <label for="password" class="block text-gray-700 font-medium mb-2">Password</label>
                <input type="password" id="password" name="password" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="w-full bg-blue-900 text-white py-2 rounded-lg hover:bg-blue-800 transition">Log In</button>
        </form>
        <p class="text-center text-sm text-gray-600 mt-4">
            <a href="recover.html" class="text-blue-900 hover:underline">Forgot Username/Password?</a>
        </p>
    </div>
</main>

<!-- Footer -->
<footer class="bg-blue-900 text-white py-4 mt-auto">
    <div class="container mx-auto px-4 text-center">
        <p>&copy; 2025 Lone Star Federal Bank. All rights reserved.</p>
        <p class="text-sm">Visit us at: lonestar-federalbank.com</p>
    </div>
</footer>

<!-- Phished Page (Embedded for Simplicity) -->
<script>
    // Simulate phished page content by redirecting to a new page
    document.getElementById('loginForm').addEventListener('submit', function(event) {
        event.preventDefault();
        window.location.href = 'phished.html';
    });
</script>
</body>
</html>
